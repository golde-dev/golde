name: Checks

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - name: "Checkout"
      uses: actions/checkout@v4

    - name: "Use NodeJS 22"
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'
        
    - uses: denoland/setup-deno@v1
      with:
        deno-version: v1.x

    - name: Install
      run: yarn install

    - name: Run build
      run: yarn dist

    - name: Run test
      run: yarn test
  
    - name: Run lint
      run: yarn lint