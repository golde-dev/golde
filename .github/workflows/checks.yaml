name: Checks

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - name: "Checkout"
      uses: actions/checkout@v4

    - name: "Setup Node"
      uses: actions/setup-node@v4
      with:
        node-version: '24.0.2'
        cache: 'yarn'
        
    - name: "Setup Deno"
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x
        cache: true

    - name: Install
      run: yarn install

    - name: Lint
      run: yarn lint

    - name: Build
      run: yarn dist

    - name: Test
      run: yarn test